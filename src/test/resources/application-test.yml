spring:
  datasource:
    # These will be overridden by @DynamicPropertySource in CardDemoIntegrationTest
    url: jdbc:postgresql://127.0.0.1:5433/carddemo
    username: carddemo
    password: carddemo_test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

logging:
  level:
    com.carddemo: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: INFO

jwt:
  secret: CardDemoIntegrationTestSecretKeyMustBeLongEnough2024ForSecurity
  expiration: 3600000
