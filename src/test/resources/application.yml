# Test application configuration – overrides main application.yml for unit/integration tests.
# Uses H2 in-memory database so tests can run without a live PostgreSQL instance.
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    enabled: false   # Flyway disabled for tests – JPA creates schema via ddl-auto

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

logging:
  level:
    com.carddemo: DEBUG
    org.springframework: WARN
