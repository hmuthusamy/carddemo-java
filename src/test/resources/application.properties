# Test datasource: H2 in-memory (replaces PostgreSQL for unit tests)
spring.datasource.url=jdbc:h2:mem:carddemo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Spring Batch – initialise schema automatically for H2 in tests
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# CBACT01C output file (temp location for tests)
cbact01c.output.file=target/CBACT01C_TEST_OUTPUT.txt
