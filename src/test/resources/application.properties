# Test-only application properties – overrides main application.properties
# Uses H2 in-memory DB so no Postgres connection is needed during unit tests.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway in tests – schema is created by JPA DDL above
spring.flyway.enabled=false

# Disable Spring Batch auto-run in tests
spring.batch.job.enabled=false
