spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carddemo}
    username: ${SPRING_DATASOURCE_USERNAME:carddemo}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 8080

logging:
  level:
    com.carddemo: INFO
    org.springframework: WARN

# JWT configuration — replaces RACF token-based authentication.
# COBOL COSGN00C verified: SEC-USR-TYPE 'A' = ADMIN, 'U' = USER (COCOM01Y.cpy)
carddemo:
  jwt:
    # Base64-encoded 256-bit secret; override via JWT_SECRET env var in production
    secret: ${JWT_SECRET:Y2FyZGRlbW8tc2VjcmV0LWtleS1mb3ItaHMyNTYtbXVzdC1iZS1hdC1sZWFzdC0zMi1jaGFycw==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours
