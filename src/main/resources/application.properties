# CardDemo Java – main application properties
# Production datasource: PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/carddemo
spring.datasource.username=carddemo
spring.datasource.password=carddemo
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Spring Batch – do NOT run jobs automatically on context start in prod
spring.batch.job.enabled=false

# CBACT01C output file path (mirrors JCL OUTFILE DD statement)
cbact01c.output.file=target/CBACT01C_OUTPUT.txt
